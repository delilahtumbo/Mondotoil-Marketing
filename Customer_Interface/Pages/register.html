<!DOCTYPE html> <!--Declares the document type as HTML5.-->
<html> <!--The opening tag for the HTML document.-->

<head> <!-- The head section of the HTML document, which contains metadata and links to external resources.-->
	<title>Login Form</title> <!--Sets the title of the web page to "Login Form."-->
	<link rel="stylesheet" type="text/css" href="style.css"> <!--Links an external CSS file named "style.css" to style the page.-->
</head> 

<body> 
	<div class="container"> <!--A container div that encloses the registration form and related elements.-->
		<h1>Registration Form</h1> <!--A heading displaying "Registration Form."-->
		<form method="post" action="register.php"> <!--Defines a form element for user input. It uses the POST method and sends data to "register.php" when the user submits the form.-->
			<!--Labels for the form fields, including "Name," "Username," "Email," and "Password."-->
			<!-- Input fields for the user to enter their name, username, email, and password. The "required" attribute ensures that these fields must be filled out.-->
			<label for="name"> Name: </label> 
			<input type="text" id="name" name="name" required> 

			<label for="username"> Username: </label> 
			<input type="text" id="username" name="username" required> 

			<label for="email">Email:</label> 
			<input type="email" id="email" name="email" required> 

			<label for="password">Password:</label> 
			<input type="password" id="password" name="password" required> 

			<input type="submit" value="Register"> <!--A submit button to submit the registration form.-->
		</form> 
		<p> Already have an account?</p> <!--A text paragraph indicating that if the user already has an account, they can click -->
		<a href="login.html">Click Here</a> <!--A link that redirects users to the login page ("login.html").-->
	</div> 
	<br> 
</body> <!--Closes the body section of the HTML document.-->
</html> <!--Closes the HTML document.-->
